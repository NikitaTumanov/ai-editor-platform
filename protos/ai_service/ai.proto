syntax = "proto3";

package ai.v1;

option go_package = "github.com/NikitaTumanov/ai-editor-platform/protos/ai;aipb";

service AI {
  rpc Question (QuestionRequest) returns (QuestionResponse);
  rpc UpdateDocumentById (UpdateDocumentByIdRequest) returns (UpdateDocumentByIdResponse);
}

message QuestionRequest {
  string question = 1;
}

message QuestionResponse {
  string answer = 1;
}

message UpdateDocumentByIdRequest {
  int64 document_id = 1;
  int64 user_id = 2;
  string promt = 3;
}

message UpdateDocumentByIdResponse {
  int64 document_id = 1;
}