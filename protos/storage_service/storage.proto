message GetDocumentByIdRequest {
  int64 document_id = 1;
  int64 user_id = 2;
}

message GetDocumentByIdResponse {
  int64 document_id = 1;
  string name = 2;
  bytes data = 3;
  int64 user_id = 4;
}

message GetDocumentsByUserIdRequest {
  int64 user_id = 1;
}

message Document {
  int64 document_id = 1;
  string name = 2;
}

message GetDocumentsByUserIdResponse {
  repeated Document documents = 1;
}
